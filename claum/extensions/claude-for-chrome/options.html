<!--
  Claude for Chrome — options page.
  Opened automatically on first install, or via
  chrome://extensions → Claude → Details → Extension options.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Claude — settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="sidepanel.css">
  <style>
    body {
      grid-template-rows: none;
      display: block;
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px;
    }
    .sub { color: var(--text-secondary); margin-bottom: 28px; }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      margin: 20px 0 8px;
    }
    input[type="password"], input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      color: var(--text-primary);
      background: var(--bg-elevated);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      outline: none;
    }
    input:focus, select:focus { border-color: var(--claude-orange); }
    .row { display: flex; gap: 10px; align-items: center; }
    .row button {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glass);
      background: var(--claude-orange);
      color: white;
      font: inherit;
      cursor: pointer;
    }
    .row button.secondary {
      background: transparent;
      color: var(--text-primary);
    }
    .status {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-secondary);
      min-height: 1em;
    }
    .status.ok  { color: #7DD389; }
    .status.err { color: #FF8A8A; }
    a { color: var(--claude-orange); }
  </style>
</head>
<body>
  <h1>Claude</h1>
  <p class="sub">Pre-installed with Claum. Set your API key to start chatting.</p>

  <label for="api-key">Anthropic API key</label>
  <input id="api-key" type="password" placeholder="sk-ant-...">

  <label for="model">Default model</label>
  <select id="model">
    <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (balanced)</option>
    <option value="claude-opus-4-6">Claude Opus 4.6 (most capable)</option>
    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (fastest)</option>
  </select>

  <div class="row" style="margin-top:20px">
    <button id="save">Save</button>
    <button id="test" class="secondary">Test connection</button>
  </div>
  <div class="status" id="status"></div>

  <p style="margin-top:36px;color:var(--text-secondary);font-size:12px">
    Don't have a key?
    <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">
      Create one in the Anthropic console</a>.
    Your key is stored in Chrome's encrypted sync storage and only sent to
    <code>api.anthropic.com</code>.
  </p>

  <script src="options.js"></script>
</body>
</html>
