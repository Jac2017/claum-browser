# ============================================================================
# Claum — macOS build on GitHub Actions
# ----------------------------------------------------------------------------
# Triggered manually (Actions tab → "Build Claum (macOS)" → Run workflow).
# Produces an arm64 (Apple Silicon) .dmg as a downloadable artifact.
#
# Timing: ~3–5 hours on GitHub's macOS runners. The free tier has a 6 hour
# cap, so we use the largest macos-* runner available (macos-14 is M1).
# ============================================================================

name: Build Claum (macOS)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        default: "arm64"
        type: choice
        options: [arm64, x86_64]
      default_search:
        description: "Default search engine"
        default: "bing"
        type: choice
        options: [bing, duckduckgo, google, startpage]

jobs:
  build:
    # macos-14 = Apple Silicon. Upgrade to macos-15 when available for your plan.
    runs-on: macos-14
    timeout-minutes: 330   # 5 hr 30 min — just under GitHub's 6 hr cap
    steps:
      - name: Check out Claum repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # GitHub's macOS runners come preloaded with multiple Xcode versions,
      # tons of iOS simulators, the Android SDK, etc. We only need ONE
      # Xcode and the Apple Silicon simulators are irrelevant to us.
      # Clearing this out frees ~30-50 GB, which Chromium's build needs.
      # ------------------------------------------------------------------
      - name: Free up disk space on runner
        run: |
          echo "Disk space BEFORE cleanup:"
          df -h /
          df -h $HOME

          # Remove all Xcode versions except the active one (current default
          # on macos-14 is Xcode_15.4 or similar — we keep it)
          ACTIVE_XCODE=$(xcode-select -p | sed 's|/Contents/Developer||')
          echo "Keeping active Xcode: $ACTIVE_XCODE"
          ls /Applications | grep -E '^Xcode_' | while read dir; do
            FULL="/Applications/$dir"
            if [ "$FULL" != "$ACTIVE_XCODE" ]; then
              echo "Removing $FULL"
              sudo rm -rf "$FULL"
            fi
          done

          # Remove iOS / tvOS / watchOS simulator runtimes we don't need
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Devices || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true

          # Android SDK / NDK / emulator (~14 GB) — we're building macOS, no Android.
          sudo rm -rf $ANDROID_HOME || true
          sudo rm -rf $ANDROID_NDK_HOME || true
          sudo rm -rf /Users/runner/Library/Android || true
          sudo rm -rf /usr/local/lib/android || true

          # Misc preinstalled clutter
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf ~/.dotnet || true

          echo ""
          echo "Disk space AFTER cleanup:"
          df -h /
          df -h $HOME

      - name: Install build dependencies
        run: |
          brew update
          # gn = Chromium's build-config generator (Generate Ninja).
          # ninja = the actual build runner gn generates files for.
          # ungoogled-chromium strips Google's pre-built gn binary out of the
          # Chromium source, so we install it via Homebrew here.
          brew install gn ninja python3 rsync

      - name: Cache Chromium source
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/claum-build/build/downloads
          key: chromium-src-${{ hashFiles('CHROMIUM_VERSION') }}
          restore-keys: |
            chromium-src-

      - name: Run Claum build
        env:
          CLAUM_BUILD_ROOT: ${{ github.workspace }}/claum-build
        run: |
          chmod +x claum/scripts/build-mac.sh
          ./claum/scripts/build-mac.sh \
            --arch           "${{ inputs.arch }}" \
            --default-search "${{ inputs.default_search }}"

      - name: Package .app as .dmg
        run: |
          cd $CLAUM_BUILD_ROOT/build/src/out/Claum
          hdiutil create -volname "Claum" \
                         -srcfolder "Claum.app" \
                         -ov -format UDZO \
                         "Claum-${{ inputs.arch }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claum-macOS-${{ inputs.arch }}
          path: ${{ env.CLAUM_BUILD_ROOT }}/build/src/out/Claum/Claum-${{ inputs.arch }}.dmg
          retention-days: 14
