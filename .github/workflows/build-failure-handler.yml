# ============================================================================
# Claum — Build failure handler (auto-retry + auto-issue)
# ----------------------------------------------------------------------------
# PURPOSE
#   This workflow runs AFTER the main "Build Claum (macOS)" workflow finishes
#   and takes different actions depending on the outcome:
#
#     - If the build SUCCEEDED:      do nothing, exit.
#     - If the build was CANCELLED:  do nothing (usually means a newer push
#                                    superseded it via cancel-in-progress).
#     - If the build FAILED:         classify the failure.
#         * Transient (CDN/network/disk/runner glitch) → re-run the job,
#           up to 2 retries total. No human touch needed.
#         * Real code error (compile/link/missing file) → open or update
#           a GitHub issue tagged `build-failure` with the error signature,
#           last ninja progress, and a link to the failing run.
#
# WHY THIS EXISTS
#   The Claum build takes ~1h+ per attempt. Without this handler:
#     - Flaky transient failures silently waste an hour.
#     - Code failures sit unnoticed until someone (Matt, Claude, scheduled
#       task) polls the UI, which has been unreliable in this sandbox.
#
#   With it:
#     - Transient failures self-heal.
#     - Real failures land in GitHub's issue tracker — a persistent,
#       de-duplicated backlog we can work through.
#     - The handler runs on free `ubuntu-latest` minutes, NOT mac minutes,
#       so it's cheap.
#
# SAFETY / SCOPE
#   - Only acts on the "Build Claum (macOS)" workflow, not other workflows.
#   - Retries are capped at 2 — we never loop forever.
#   - Issues are de-duplicated by signature, so we don't spam the tracker.
#   - Uses the default GITHUB_TOKEN (scoped to this repo), no PAT needed.
# ============================================================================

name: Build failure handler

# ----------------------------------------------------------------------------
# Trigger: `workflow_run` fires whenever the named workflow completes.
# ----------------------------------------------------------------------------
# `types: [completed]` means we get all conclusions — success, failure,
# cancelled, neutral, skipped, timed_out, action_required, stale. We filter
# to just `failure` in the job's `if:` guard below.
#
# Important quirk: `workflow_run` handlers ALWAYS run on the repo's default
# branch, regardless of which branch the parent workflow ran on. That's
# fine for us — we only build on `main`.
# ----------------------------------------------------------------------------
on:
  workflow_run:
    workflows: ["Build Claum (macOS)"]
    types: [completed]

# ----------------------------------------------------------------------------
# Permissions: by default GITHUB_TOKEN is "read-only" for workflow_run
# triggers. We need to ELEVATE two:
#   - issues: write   — to open/comment on tracking issues
#   - actions: write  — to POST /actions/runs/{id}/rerun-failed-jobs
# Everything else stays at the minimum (read).
# ----------------------------------------------------------------------------
permissions:
  issues: write
  actions: write
  contents: read

jobs:
  handle-failure:
    # Fire for:
    #   - failure: real build errors (compile/link/etc)
    #   - cancelled: usually GitHub's 5h30m timeout OR concurrency supersede
    #   - timed_out: explicit step-level timeout
    # We DO want to retry on cancelled because sccache means a fresh run will
    # near-instantly pick up where the previous timed-out run left off, via
    # the actions-cache-backed compile cache. The 2-retry cap still applies,
    # so a malicious-cancel loop isn't possible. If a user manually cancels
    # multiple times, the attempt counter hits the cap and stops.
    # Skip success + skipped.
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'timed_out'

    runs-on: ubuntu-latest

    # Give ourselves a generous budget but cap it so a wedged handler
    # can't eat the billing quota. 15 min is well above what we need.
    timeout-minutes: 15

    steps:
      # ----------------------------------------------------------------
      # Step 0: Make sure our labels exist before any issue creation.
      # ----------------------------------------------------------------
      # Handler run #2 failed at "Create or update tracking issue" in 0s
      # because `github.rest.issues.create({ labels: [...] })` rejects with
      # 422 if any label in the array doesn't exist on the repo. Despite
      # what some old docs imply, GitHub does NOT auto-create labels here.
      #
      # Cheapest robust fix: try to create each label up-front. If it
      # already exists, GitHub returns 422 and we swallow it — the call is
      # idempotent in effect. No PAT needed, default GITHUB_TOKEN is fine
      # because we already requested `issues: write` above.
      # ----------------------------------------------------------------
      - name: Ensure issue labels exist
        uses: actions/github-script@v7
        with:
          script: |
            // Two labels we attach to every auto-filed issue.
            // color = hex without leading #. Pick obvious-but-distinct
            // colors so they're easy to spot in the issue list.
            const labels = [
              { name: 'build-failure', color: 'd73a4a',
                description: 'Auto-filed by build-failure-handler workflow.' },
              { name: 'automated',     color: 'cccccc',
                description: 'Created by an automated workflow, not a human.' },
            ];

            for (const lbl of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...lbl,
                });
                core.info(`Created label "${lbl.name}"`);
              } catch (err) {
                // 422 = label already exists. Anything else, log and keep
                // going — issue creation step has its own fallback below.
                if (err.status === 422) {
                  core.info(`Label "${lbl.name}" already exists — OK`);
                } else {
                  core.warning(`Failed to create label "${lbl.name}": ${err.message}`);
                }
              }
            }

      # ----------------------------------------------------------------
      # Step 1: Fetch metadata about the failed run.
      # ----------------------------------------------------------------
      # We use `actions/github-script` (official action that exposes an
      # authenticated Octokit client + the workflow context). Output the
      # values we care about so later steps can use them.
      # ----------------------------------------------------------------
      - name: Gather failed run info
        id: run
        uses: actions/github-script@v7
        with:
          # `script` is inline JS run in the action's Node runtime.
          # `github` = Octokit client. `context` = GitHub event payload.
          # `core` = toolkit helpers (setOutput, setFailed, summary).
          script: |
            // The parent run payload is in `context.payload.workflow_run`.
            const wr     = context.payload.workflow_run;
            const runId  = wr.id;
            const sha    = wr.head_sha;
            const branch = wr.head_branch;
            const attempt = wr.run_attempt;  // 1 on first run, 2 after rerun, etc.
            const url    = wr.html_url;

            // List jobs inside the parent run (usually just "build"). We
            // need a job id to a) download logs, b) target the rerun API.
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              run_id: runId,
            });

            // Accept ANY non-success terminal conclusion as a "failed job"
            // candidate. Handler run #4 exposed the bug: a 5h30m timeout
            // surfaces jobs with `conclusion: 'cancelled'` (not 'failure'),
            // so the old strict `=== 'failure'` filter returned empty and
            // the handler setFailed() before it could reach the rerun step.
            //
            // We include:
            //   - 'failure'     — normal compile/link error
            //   - 'cancelled'   — GH 5h30m timeout OR manual cancel OR
            //                     concurrency superseded by a newer push
            //   - 'timed_out'   — explicit per-step timeout-minutes hit
            //   - null          — jobs whose status is still being
            //                     reconciled when we query; safer to
            //                     include than to exclude
            const failed = jobs.filter(j =>
              j.conclusion === 'failure' ||
              j.conclusion === 'cancelled' ||
              j.conclusion === 'timed_out' ||
              j.conclusion === null
            );

            // Last-ditch fallback: if no job matched (shouldn't happen
            // because our `if:` guard only fires on non-success), fall
            // back to the first job. Better to classify something than
            // bail out — bailing out just leaves us stuck.
            let target;
            if (failed.length > 0) {
              target = failed[0];
            } else if (jobs.length > 0) {
              core.warning(
                `No job with failure/cancelled/timed_out conclusion, but ` +
                `the parent run concluded as '${wr.conclusion}'. ` +
                `Falling back to first job: ${jobs[0].name}`
              );
              target = jobs[0];
            } else {
              core.setFailed(
                `No jobs at all in run ${runId}. Cannot classify — ` +
                `nothing to rerun. Check parent workflow manually.`
              );
              return;
            }

            // Expose for downstream steps.
            core.setOutput('run_id',      runId);
            core.setOutput('job_id',      target.id);
            core.setOutput('job_name',    target.name);
            core.setOutput('job_conclusion', target.conclusion || 'unknown');
            core.setOutput('run_conclusion', wr.conclusion || 'unknown');
            core.setOutput('head_sha',    sha);
            core.setOutput('branch',      branch);
            core.setOutput('attempt',     attempt);
            core.setOutput('html_url',    url);

            // Friendly log that shows up in the handler's own run page.
            await core.summary
              .addHeading(`Handling failed run #${runId}`)
              .addRaw(`Job: **${target.name}** (id \`${target.id}\`)`).addBreak()
              .addRaw(`Job conclusion: **${target.conclusion || 'null'}**`).addBreak()
              .addRaw(`Run conclusion: **${wr.conclusion || 'null'}**`).addBreak()
              .addRaw(`Commit: \`${sha}\``).addBreak()
              .addRaw(`Attempt: **${attempt}**`).addBreak()
              .addLink('Open failed run', url).addBreak()
              .write();

      # ----------------------------------------------------------------
      # Step 2: Download the failed job's raw log.
      # ----------------------------------------------------------------
      # The logs REST endpoint returns plain text (after following a
      # redirect to Azure blob). `gh api` handles the redirect for us,
      # so we get the log directly on stdout.
      # ----------------------------------------------------------------
      - name: Download failed job log
        env:
          # GITHUB_TOKEN is auto-provided to the runner with the perms
          # defined above. `gh` picks it up from GH_TOKEN.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_ID:   ${{ steps.run.outputs.job_id }}
        # Tolerance: if log retrieval fails (e.g. the job was cancelled
        # before emitting logs), we still want to continue so the
        # classifier can treat this as a generic transient failure and
        # trigger a retry. `set -e` would otherwise nuke the whole
        # handler and leave us stuck — exactly the failure mode we're
        # trying to eliminate.
        run: |
          set -uo pipefail
          echo "Fetching log for job ${JOB_ID}"
          if gh api \
               "/repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" \
               -H "Accept: application/vnd.github+json" \
               > log.txt 2>log.err; then
            echo "Log size: $(wc -c < log.txt) bytes"
          else
            echo "WARN: Could not fetch job log (see error below)."
            sed 's/^/    /' log.err || true
            # Seed log.txt with a synthetic marker so the classifier has
            # something to match on. We choose a string that's in the
            # transient-patterns list, so the run auto-retries. This is
            # the right behaviour: if we can't even fetch the log, the
            # infra is flaky, not the code.
            echo "Job was cancelled (no log available — handler fetch failed)" > log.txt
          fi

      # ----------------------------------------------------------------
      # Step 3: Classify the failure.
      # ----------------------------------------------------------------
      # We distinguish "transient" (retry) from "code error" (issue).
      # Transient patterns are curated — extend the list as new classes
      # of flake show up.
      # ----------------------------------------------------------------
      - name: Classify failure
        id: classify
        env:
          RUN_CONCLUSION: ${{ steps.run.outputs.run_conclusion }}
          JOB_CONCLUSION: ${{ steps.run.outputs.job_conclusion }}
        run: |
          set -uo pipefail

          # --------------------------------------------------------------
          # Short-circuit: cancellations and timeouts are ALWAYS transient.
          # --------------------------------------------------------------
          # GitHub Actions cancels a job for two reasons that matter to us:
          #   1. The 5h30m (timeout-minutes: 330) wall-clock fires — this
          #      is the norm for partial Chromium compiles. With sccache
          #      persisting across runs, the next attempt picks up where
          #      this one left off and finishes the remaining ~10-20%.
          #   2. concurrency: cancel-in-progress superseded this run with
          #      a newer commit. In that case a new build is already
          #      running, so our retry is harmless (it just no-ops).
          #
          # Either way: retry unconditionally. No need to scan the log
          # for patterns — we already know it's transient.
          # --------------------------------------------------------------
          if [ "$RUN_CONCLUSION" = "cancelled" ] || [ "$RUN_CONCLUSION" = "timed_out" ] \
          || [ "$JOB_CONCLUSION" = "cancelled" ] || [ "$JOB_CONCLUSION" = "timed_out" ]; then
            echo "Cancellation/timeout detected (run=$RUN_CONCLUSION job=$JOB_CONCLUSION) → transient."
            echo "is_transient=true" >> "$GITHUB_OUTPUT"
            echo "matched_pattern=cancellation-or-timeout" >> "$GITHUB_OUTPUT"
            echo "signature=Job cancelled or timed out (run=$RUN_CONCLUSION job=$JOB_CONCLUSION)" >> "$GITHUB_OUTPUT"
            # Still try to pull a last ninja marker from the log (for
            # issue context if retries are later exhausted).
            LAST_NINJA_LN="$(grep -oE '\[[0-9]+/[0-9]+\]' log.txt 2>/dev/null | tail -1 || true)"
            [ -n "$LAST_NINJA_LN" ] || LAST_NINJA_LN='none'
            echo "last_ninja=$LAST_NINJA_LN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --------------------------------------------------------------
          # Transient signature list. Each entry is a grep -E regex.
          # Keep entries narrow to avoid misclassifying real bugs.
          # --------------------------------------------------------------
          TRANSIENT_PATTERNS=(
            'Cannot connect to the Docker daemon'
            'Unable to locate package'
            'Could not resolve host'
            '504 Gateway Timeout'
            'Connection timed out'
            'Temporary failure in name resolution'
            'curl: \(28\)'                     # curl operation timeout
            'curl: \(56\)'                     # curl receive failure
            'fatal: unable to access'          # git over https failure
            'The action .* failed with an internal error'
            'Error: The operation was canceled\.'
            'No space left on device'          # runner out of disk
            # GitHub's hard per-job wall clock (5h30m in our case).
            # sccache will pick up most of the compiled work on retry.
            'The job has exceeded the maximum execution time'
            'Job was cancelled'
            # sccache backend (GH Actions cache → Azure storage) outage.
            # Build #37 hit this — Azure returned an HTML "services
            # unavailable" page; sccache crashed at startup and every
            # `sccache clang++` invocation died. Retry usually works.
            'sccache: error: Server startup failed'
            'cache storage failed to read'
            "services aren'\''t available right now"
          )

          # --------------------------------------------------------------
          # Last ninja progress marker for context in the issue body.
          # Pattern is [N/56129] where 56129 is our total action count.
          # --------------------------------------------------------------
          LAST_NINJA="$(grep -oE '\[[0-9]+/56129\]' log.txt | tail -1 || true)"
          [ -n "$LAST_NINJA" ] || LAST_NINJA='none'
          echo "last_ninja=$LAST_NINJA" >> "$GITHUB_OUTPUT"

          # --------------------------------------------------------------
          # Pick the first diagnostic signature we can find. Priority:
          #   1. sccache server failure  — Azure cache outage (#37)
          #   2. FileNotFoundError       — pruned bins (5+ occurrences)
          #   3. fatal error:            — clang compile errors
          #   4. error:                  — generic linker/tool errors
          #   5. ninja: build stopped    — fallback
          # Truncate to 180 chars to keep issue titles sane.
          # --------------------------------------------------------------
          # IMPORTANT: filter out comments from our own bash scripts.
          # build-mac.sh has lines like "#     fatal error: 'jpeglib.h'"
          # in its comments documenting old failures, and `set -x` echoes
          # those to the log during execution. Build #37 was misclassified
          # because the classifier matched our own historical comment
          # instead of the real sccache failure.
          #
          # The grep below `-v`-excludes lines that look like a bash
          # script comment line: they begin with optional whitespace,
          # then a `#`, then more text. We pipe log.txt through that
          # filter BEFORE searching for the signature.
          # --------------------------------------------------------------
          # Strip comment lines once for all signature greps.
          grep -v -E '^[[:space:]]*#' log.txt > log_nocomments.txt || true

          SIG="$(grep -m1 -E 'sccache: error: Server startup failed' log_nocomments.txt || true)"
          if [ -z "$SIG" ]; then
            SIG="$(grep -m1 -E 'FileNotFoundError' log_nocomments.txt || true)"
          fi
          if [ -z "$SIG" ]; then
            SIG="$(grep -m1 -E 'fatal error:' log_nocomments.txt || true)"
          fi
          if [ -z "$SIG" ]; then
            SIG="$(grep -m1 -E '^[^ ]+: error:' log_nocomments.txt || true)"
          fi
          if [ -z "$SIG" ]; then
            SIG="$(grep -m1 -E 'ninja: build stopped' log_nocomments.txt || true)"
          fi
          [ -n "$SIG" ] || SIG='Unknown failure (no diagnostic match)'

          # Truncate + normalise whitespace for stable dedup + title length.
          SIG_TRIMMED="$(printf '%s' "$SIG" | tr -s '[:space:]' ' ' | cut -c1-180)"

          # Heredoc-style multiline output so embedded chars don't break parsing.
          {
            echo "signature<<EOF"
            printf '%s\n' "$SIG_TRIMMED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # --------------------------------------------------------------
          # Run the transient patterns against the log. First match wins.
          # --------------------------------------------------------------
          IS_TRANSIENT=false
          MATCHED_PATTERN=''
          for p in "${TRANSIENT_PATTERNS[@]}"; do
            if grep -qE "$p" log.txt; then
              IS_TRANSIENT=true
              MATCHED_PATTERN="$p"
              break
            fi
          done

          echo "is_transient=$IS_TRANSIENT" >> "$GITHUB_OUTPUT"
          echo "matched_pattern=$MATCHED_PATTERN" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Classification: transient=$IS_TRANSIENT  last_ninja=$LAST_NINJA"
          echo "Signature: $SIG_TRIMMED"
          # IMPORTANT: append `|| true` here. Under `set -e`, the bare
          # `[ -n "" ] && echo ...` returns exit 1 when MATCHED_PATTERN
          # is empty — and with `set -e` that kills the entire step
          # before downstream Re-run / Issue-creation steps can execute.
          # That bug bit handler run #3 (build #37). The `|| true` makes
          # the whole compound expression always succeed.
          { [ -n "$MATCHED_PATTERN" ] && echo "Matched transient pattern: $MATCHED_PATTERN"; } || true

      # ----------------------------------------------------------------
      # Step 4a: TRANSIENT + attempt < 3 → re-run the failed jobs.
      # ----------------------------------------------------------------
      # The `rerun-failed-jobs` endpoint retries ONLY the failed steps,
      # so it doesn't redo the 30 min source unpack if that already
      # succeeded. It uses the same commit (head_sha), no code change.
      # ----------------------------------------------------------------
      - name: Re-run failed jobs (transient)
        # We bumped the attempt cap from 3 → 10. Rationale: with the new
        # actions/cache-backed sccache (see build-mac.yml), each retry
        # picks up where the last left off, so the build is GUARANTEED
        # to converge within a handful of retries. 10 is belt-and-suspenders
        # to avoid a stuck loop if something goes pathologically wrong.
        if: >-
          steps.classify.outputs.is_transient == 'true' &&
          fromJSON(steps.run.outputs.attempt) < 10
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          RUN_ID:         ${{ steps.run.outputs.run_id }}
          RUN_CONCLUSION: ${{ steps.run.outputs.run_conclusion }}
        # `set -uo pipefail` (NOT `set -e`) — so if the REST call fails we
        # can fall back to dispatching a fresh run instead of bailing.
        run: |
          set -uo pipefail
          echo "Transient failure on attempt ${{ steps.run.outputs.attempt }}."
          echo "Matched pattern: ${{ steps.classify.outputs.matched_pattern }}"
          echo "Run conclusion: $RUN_CONCLUSION"

          # -----------------------------------------------------------
          # Pick the right rerun endpoint based on the parent's state.
          # -----------------------------------------------------------
          # /rerun-failed-jobs → only reruns jobs with conclusion=failure.
          #                      Perfect for compile errors retried mid-
          #                      stream; useless for cancellations (the
          #                      endpoint returns 403 saying "no failed
          #                      jobs to rerun").
          # /rerun            → reruns the whole workflow unconditionally.
          #                      Works for cancellations and timeouts.
          # -----------------------------------------------------------
          case "$RUN_CONCLUSION" in
            cancelled|timed_out)
              ENDPOINT="rerun"
              ;;
            *)
              ENDPOINT="rerun-failed-jobs"
              ;;
          esac
          echo "Using endpoint: /actions/runs/${RUN_ID}/${ENDPOINT}"

          RC=0
          gh api --method POST \
            "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/${ENDPOINT}" \
            > rerun.out 2> rerun.err || RC=$?
          if [ "$RC" -eq 0 ]; then
            echo "Rerun requested OK via ${ENDPOINT}."
            exit 0
          fi

          echo "WARN: ${ENDPOINT} failed (exit $RC). stderr:"
          sed 's/^/    /' rerun.err || true

          # -----------------------------------------------------------
          # Fallback: dispatch a brand new run of the parent workflow.
          # -----------------------------------------------------------
          # /actions/workflows/{workflow_file}/dispatches triggers the
          # workflow fresh on the default branch. This is our last-resort
          # path when rerun endpoints are unavailable (e.g. the original
          # run is too old, in a weird state, or the API surface changed).
          # Unlike /rerun, this creates a NEW run_id so the attempt
          # counter starts over — but that's OK, because the compile
          # cache will let it finish fast anyway.
          # -----------------------------------------------------------
          echo "Falling back to workflow_dispatch on build-mac.yml..."
          gh api --method POST \
            "/repos/${{ github.repository }}/actions/workflows/build-mac.yml/dispatches" \
            -f ref=main \
            > dispatch.out 2> dispatch.err || {
              echo "ERROR: workflow_dispatch also failed. Bailing."
              sed 's/^/    /' dispatch.err || true
              exit 1
            }
          echo "workflow_dispatch fallback succeeded — new run should appear shortly."

      # ----------------------------------------------------------------
      # Step 4b: CODE ERROR (or retry exhausted) → open/update an issue.
      # ----------------------------------------------------------------
      # We dedup by signature prefix so repeated hits of the same error
      # collapse into one issue with comments, not a flood.
      # ----------------------------------------------------------------
      - name: Create or update tracking issue
        if: >-
          steps.classify.outputs.is_transient == 'false' ||
          fromJSON(steps.run.outputs.attempt) >= 10
        uses: actions/github-script@v7
        env:
          SIG:        ${{ steps.classify.outputs.signature }}
          LAST_NINJA: ${{ steps.classify.outputs.last_ninja }}
          HTML_URL:   ${{ steps.run.outputs.html_url }}
          HEAD_SHA:   ${{ steps.run.outputs.head_sha }}
          ATTEMPT:    ${{ steps.run.outputs.attempt }}
          JOB_NAME:   ${{ steps.run.outputs.job_name }}
        with:
          script: |
            // Pull env vars into locals for readability.
            const sig       = process.env.SIG        || 'Unknown failure';
            const lastNinja = process.env.LAST_NINJA || 'none';
            const url       = process.env.HTML_URL;
            const sha       = process.env.HEAD_SHA;
            const attempt   = process.env.ATTEMPT;
            const jobName   = process.env.JOB_NAME;

            // Dedup key: first 60 chars of signature, whitespace collapsed.
            // This keeps "fatal error: 'jpeglib.h' file not found" issues
            // from multiplying across runs.
            const dedupKey = sig.replace(/\s+/g, ' ').trim().slice(0, 60);
            const title = `[build] ${dedupKey}`;

            // Issue body — Markdown rendered in the GitHub UI.
            const body = [
              `**Failure signature**`,
              '```',
              sig,
              '```',
              '',
              `- **Last ninja progress:** \`${lastNinja}\` / [56129]`,
              `- **Failed run:** ${url}`,
              `- **Commit:** \`${sha}\``,
              `- **Attempt:** ${attempt}`,
              `- **Job:** \`${jobName}\``,
              '',
              `_Auto-filed by the \`build-failure-handler\` workflow._`,
              `_Assign to Claude / fix, and close the issue once the next build passes._`,
            ].join('\n');

            // Look for an existing open issue with the same title. We filter
            // by label to avoid colliding with any hand-written issues.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'build-failure',
              per_page: 100,
            });

            const match = existing.find(i => i.title === title);

            if (match) {
              // Update existing: comment with the new run details.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: match.number,
                body: `Another hit of this signature:\n\n${body}`,
              });
              core.info(`Commented on existing issue #${match.number}`);
              await core.summary
                .addHeading('Commented on tracking issue')
                .addLink(`#${match.number}: ${title}`, match.html_url)
                .write();
            } else {
              // Create fresh issue. Step 0 ("Ensure issue labels exist")
              // pre-creates the labels we attach here, so this should
              // succeed. Belt-and-suspenders: if it 422s for any reason
              // (e.g. labels deleted between steps), retry without labels
              // so the issue still lands.
              let created;
              try {
                ({ data: created } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title,
                  body,
                  labels: ['build-failure', 'automated'],
                }));
              } catch (err) {
                if (err.status === 422) {
                  core.warning(
                    `Issue create with labels failed (${err.message}); ` +
                    `retrying without labels.`
                  );
                  ({ data: created } = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    title,
                    body,
                    // No labels — guarantee the create call goes through.
                  }));
                } else {
                  // Non-422 error: re-throw so the workflow surfaces it.
                  throw err;
                }
              }
              core.info(`Created new issue #${created.number}`);
              await core.summary
                .addHeading('Opened tracking issue')
                .addLink(`#${created.number}: ${title}`, created.html_url)
                .write();
            }
