# ============================================================================
# Claum — macOS build on GitHub Actions
# ----------------------------------------------------------------------------
# Triggered manually (Actions tab → "Build Claum (macOS)" → Run workflow).
# Produces an arm64 (Apple Silicon) .dmg as a downloadable artifact.
#
# Timing: ~3–5 hours on GitHub's macOS runners. The free tier has a 6 hour
# cap, so we use the largest macos-* runner available (macos-14 is M1).
# ============================================================================

name: Build Claum (macOS)

on:
  # Manual dispatch (Actions tab → Run workflow) — preserves the inputs so
  # Matt can still pick an arch/search at trigger time.
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        default: "arm64"
        type: choice
        options: [arm64, x86_64]
      default_search:
        description: "Default search engine"
        default: "bing"
        type: choice
        options: [bing, duckduckgo, google, startpage]

  # Auto-trigger on any push to main, so the autonomous debug loop just
  # needs to push a fix — a new build runs automatically. Skip builds for
  # docs-only commits (BUILD_NOTES, READMEs) to avoid wasting runner minutes.
  push:
    branches: [main]
    paths-ignore:
      - 'BUILD_NOTES.md'
      - 'README.md'
      - 'docs/**'
      - '**/*.md'

# Only one build of this workflow runs at a time per ref. If a new commit
# lands while a build is in progress, the in-flight build is cancelled
# (because its fix was stale). This saves lots of runner minutes during
# the iterate-fix-push loop.
concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macos-15 = Apple Silicon M1 with Xcode 16.3+ (has newer MacOSX SDK with
    # the DarwinFoundation1.modulemap file that Chromium 146 references).
    # Was macos-14, which ships Xcode 16.2 and triggers the modulemap bug.
    runs-on: macos-15
    timeout-minutes: 330   # 5 hr 30 min — just under GitHub's 6 hr cap
    steps:
      - name: Check out Claum repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Chromium 146 requires macOS SDK 15+. We don't care about Xcode VERSION
      # numbers — we only care that the Xcode we pick has SDK 15 inside it.
      # (Apple's version naming is messy: Xcode 16 ships SDK 15, Xcode 26
      # ships SDK 26, etc., and GitHub's runner image changes over time.)
      #
      # Strategy: enumerate every /Applications/Xcode*.app, peek inside its
      # SDKs/ folder, pick whichever Xcode actually contains a MacOSX SDK
      # with version >= 15. Then persist the choice to $GITHUB_ENV so it's
      # in scope for ALL later steps (otherwise xcode-select -s alone is
      # fragile — env vars take precedence over the global symlink).
      # ------------------------------------------------------------------
      - name: Select Xcode with macOS SDK 15+
        run: |
          echo "==> Xcodes installed on this runner:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          echo ""
          echo "==> Checking which Xcode has SDK 15+ ..."
          BEST_XCODE=""
          BEST_SDK_VER=""

          for app in /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            SDK_DIR="$app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"
            [ -d "$SDK_DIR" ] || continue

            # Look for any MacOSX<NN>.sdk where NN >= 15.
            # `ls` returns names like MacOSX15.sdk, MacOSX15.4.sdk, MacOSX26.sdk, etc.
            for sdk in "$SDK_DIR"/MacOSX*.sdk; do
              [ -d "$sdk" ] || continue
              base=$(basename "$sdk")
              # Strip the prefix and suffix to extract a version number.
              # e.g. "MacOSX15.4.sdk" -> "15.4"
              ver=$(echo "$base" | sed -E 's/MacOSX([0-9.]+)\.sdk/\1/')
              [ -z "$ver" ] && continue
              # MacOSX.sdk (no version) is a symlink to whatever's default; skip.
              [ "$base" = "MacOSX.sdk" ] && continue

              # Major-version check: split on the first dot.
              major="${ver%%.*}"
              if [ "$major" -ge 15 ] 2>/dev/null; then
                echo "  $app contains $base (version $ver)"
                # Keep track of the highest SDK version seen.
                # `sort -V` understands semantic versions (15.0 < 15.4 < 26.0).
                if [ -z "$BEST_SDK_VER" ] \
                   || [ "$(printf '%s\n%s\n' "$BEST_SDK_VER" "$ver" | sort -V | tail -1)" = "$ver" ]; then
                  BEST_SDK_VER="$ver"
                  BEST_XCODE="$app"
                fi
              fi
            done
          done

          if [ -z "$BEST_XCODE" ]; then
            echo ""
            echo "ERROR: No Xcode with macOS SDK 15+ found on this runner."
            echo "Chromium 146 requires SDK 15+. Either:"
            echo "  - upgrade the runner to macos-15 in build-mac.yml, OR"
            echo "  - add a step that downloads SDK 15 from xcodes.dev."
            echo ""
            echo "SDKs found per Xcode:"
            for app in /Applications/Xcode*.app; do
              echo "  $app:"
              ls "$app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs" 2>/dev/null || echo "    (no SDK dir)"
            done
            exit 1
          fi

          echo ""
          echo "==> Selected: $BEST_XCODE  (best SDK: $BEST_SDK_VER)"
          sudo xcode-select -s "$BEST_XCODE/Contents/Developer"

          # Persist the choice for ALL subsequent steps. DEVELOPER_DIR takes
          # precedence over xcode-select's global symlink — so even if the
          # symlink later gets disturbed (e.g. by deleting the directory it
          # points to), tools like xcrun/xcodebuild will still find the right
          # Xcode via this env var.
          echo "DEVELOPER_DIR=$BEST_XCODE/Contents/Developer" >> "$GITHUB_ENV"
          echo "SDKROOT=$BEST_XCODE/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" >> "$GITHUB_ENV"

          echo ""
          echo "==> Verification:"
          xcode-select -p
          xcodebuild -version
          echo "SDKs in selected Xcode:"
          ls "$BEST_XCODE/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"

      # ------------------------------------------------------------------
      # GitHub's macOS runners come preloaded with multiple Xcode versions,
      # tons of iOS simulators, the Android SDK, etc. We only need ONE
      # Xcode and the Apple Silicon simulators are irrelevant to us.
      # Clearing this out frees ~30-50 GB, which Chromium's build needs.
      #
      # NOTE: this runs AFTER the "Select Xcode 16+" step above, so the
      # "active" Xcode we preserve here is the Xcode 16 we just selected —
      # not the runner's original default (which is typically Xcode 15.x).
      # ------------------------------------------------------------------
      - name: Free up disk space on runner
        run: |
          echo "Disk space BEFORE cleanup:"
          df -h /
          df -h $HOME

          # Determine the active Xcode and its CANONICAL path (resolves any
          # symlinks). DEVELOPER_DIR was set by the previous step, but fall
          # back to xcode-select if it's not set for some reason.
          ACTIVE_RAW="${DEVELOPER_DIR:-$(xcode-select -p)}"
          ACTIVE_XCODE="${ACTIVE_RAW%/Contents/Developer}"
          # `realpath` resolves symlinks and trailing slashes — so paths like
          # /Applications/Xcode.app and /Applications/Xcode_16.2.app resolve
          # to the same canonical path if one is a symlink to the other.
          ACTIVE_CANON=$(realpath "$ACTIVE_XCODE" 2>/dev/null || echo "$ACTIVE_XCODE")
          echo "Active Xcode (raw):      $ACTIVE_XCODE"
          echo "Active Xcode (canonical): $ACTIVE_CANON"

          # Walk every /Applications/Xcode*.app and delete only those whose
          # canonical path differs from the active one.
          for app in /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            APP_CANON=$(realpath "$app" 2>/dev/null || echo "$app")
            if [ "$APP_CANON" = "$ACTIVE_CANON" ]; then
              echo "Keeping  $app"
            else
              echo "Removing $app"
              sudo rm -rf "$app"
            fi
          done

          # Remove iOS / tvOS / watchOS simulator runtimes we don't need
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Devices || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true

          # Android SDK / NDK / emulator (~14 GB) — we're building macOS, no Android.
          sudo rm -rf $ANDROID_HOME || true
          sudo rm -rf $ANDROID_NDK_HOME || true
          sudo rm -rf /Users/runner/Library/Android || true
          sudo rm -rf /usr/local/lib/android || true

          # Misc preinstalled clutter
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf ~/.dotnet || true

          echo ""
          echo "Disk space AFTER cleanup:"
          df -h /
          df -h $HOME

      - name: Install build dependencies
        run: |
          brew update
          # ninja = the actual build runner gn generates files for.
          # gn itself isn't in Homebrew — we build it from source in the
          # build script (see build-mac.sh step 1c).
          #
          # jpeg-turbo: Chromium's GN_ARGS sets `use_system_libjpeg=true`,
          # which means its libyuv/mjpeg_decoder.cc does `#include "jpeglib.h"`
          # expecting the header to live in a system include dir. macOS does
          # NOT ship jpeglib.h by default, so without this install ninja
          # dies at [1037/56129] with:
          #   fatal error: 'jpeglib.h' file not found
          # Homebrew puts the header at /opt/homebrew/opt/jpeg-turbo/include/
          # on Apple Silicon. The build script then passes that dir to GN
          # via extra_cflags so Chromium actually sees it.
          brew install ninja python3 rsync jpeg-turbo

      # ------------------------------------------------------------------
      # sccache = "shared compiler cache". It wraps every clang++ invocation
      # and stores the resulting .o file in a content-addressable cache
      # keyed by (compiler version + flags + preprocessed source hash). If
      # the same translation unit has been compiled before, sccache returns
      # the cached .o in milliseconds, skipping the real compile entirely.
      #
      # Why we need it: Chromium has 56k source files and compiling them on
      # GitHub's M1 runner takes ~8h, but GitHub kills a job after 6h. Even
      # with our 5h30m timeout, we run out of time before ninja reaches the
      # final link. sccache lets us RESUME where we left off: the killed
      # build populated the cache with whatever it compiled; the next run
      # starts fresh but hits the cache on 95%+ of files and only compiles
      # what's new + runs the linker.
      #
      # ------------------------------------------------------------------
      # CACHE BACKEND: local disk + actions/cache (NOT sccache's built-in
      # GHA backend).
      # ------------------------------------------------------------------
      # We tried SCCACHE_GHA_ENABLED=true in build #37 and #38. Problem:
      # the GHA cache backend is served by Azure blob storage, and when
      # Azure has a partial outage, sccache crashes at startup with:
      #   "services aren't available right now"
      # That took out build #37 at [215/56129] compiles done, and forced
      # build #38 to run with sccache disabled — wasting all 5h30m of
      # compile work because NOTHING was cached.
      #
      # Fix: use sccache's SCCACHE_DIR mode (plain on-disk cache in a
      # folder) and persist that folder between runs via `actions/cache`.
      # Pros over SCCACHE_GHA_ENABLED:
      #   - No Azure dependency. Disk is disk, it just works.
      #   - Same underlying storage as actions/cache's happy-path (still
      #     Azure, but the fetch is ONE actions/cache op, not thousands
      #     of sccache probes. Degrades gracefully.)
      #   - We control the key, so we can tune cache scope.
      # Cons:
      #   - Save/restore happens once at job start/end, not streaming —
      #     a savings of "the cache from 10 min ago" on crashes mid-build.
      #     Acceptable: the job either hits timeout (so save-always fires)
      #     or fails (save-always also fires via if: always()).
      # ------------------------------------------------------------------
      - name: Restore sccache disk cache
        id: sccache-restore
        uses: actions/cache/restore@v4
        with:
          # ~/.sccache-disk holds every compiled .o that sccache has seen.
          # Typical size after a full Chromium build ≈ 1-3 GB (well under
          # the 10 GB repo limit). We also cache the hit/miss stats.
          path: ~/.sccache-disk
          # Key scheme:
          #   sccache-mac-arm64-v3-<run_id>-<run_attempt>
          # On RESTORE we look up any prefix match, newest-first, via
          # restore-keys below. On SAVE we use the unique full key so no
          # two attempts ever collide.
          key: sccache-mac-arm64-v3-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sccache-mac-arm64-v3-
            sccache-mac-arm64-

      - name: Install sccache (compile cache to survive timeouts)
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Configure sccache for the build
        run: |
          # The sccache binary was just put on PATH by the action above.

          # Make sure the cache directory exists. On the very first run
          # the cache restore step above is a miss, and sccache errors
          # out if you point SCCACHE_DIR at a non-existent path.
          mkdir -p "$HOME/.sccache-disk"

          # ------------------------------------------------------------
          # Configure sccache to use LOCAL DISK (not GHA / Azure).
          # ------------------------------------------------------------
          # The sccache-action sets SCCACHE_GHA_ENABLED=on automatically
          # because that's its main use case. We need to FORCE IT OFF so
          # sccache picks the disk backend (SCCACHE_DIR) instead.
          #
          # CRITICAL: sccache only accepts these exact strings:
          #   'true', 'on', '1'   → enable GHA backend
          #   'false', 'off', '0' → disable
          # Anything else (including the empty string!) makes sccache
          # crash at startup with:
          #   "SCCACHE_GHA_ENABLED must be 'true', 'on', '1', 'false',
          #    'off' or '0'"
          # That's the bug that made #38–#40 all save 0-byte caches:
          # sccache never started, so nothing was ever cached on disk.
          echo "SCCACHE_GHA_ENABLED=false"                   >> "$GITHUB_ENV"

          # NOTE: do NOT blank ACTIONS_CACHE_URL or ACTIONS_RUNTIME_TOKEN
          # here — actions/cache (the workflow step that saves our disk
          # cache) needs both of those env vars to talk to GitHub's cache
          # service. We previously blanked them to "make extra sure"
          # sccache wouldn't reach for the GHA backend, but with
          # SCCACHE_GHA_ENABLED=false set explicitly that's redundant
          # AND harmful — without those vars actions/cache fails silently.

          # Point sccache at the disk cache we just restored (or created).
          echo "SCCACHE_DIR=$HOME/.sccache-disk"             >> "$GITHUB_ENV"

          # Cap disk usage. 10G is the most actions/cache can hold per
          # entry; we leave a bit of headroom. sccache evicts LRU entries
          # once it hits this.
          echo "SCCACHE_CACHE_SIZE=9G"                       >> "$GITHUB_ENV"

          # Don't let the server stop while ninja is between bursts —
          # 0 = never idle-out. Otherwise sccache restarts mid-build and
          # we lose the in-memory stats.
          echo "SCCACHE_IDLE_TIMEOUT=0"                      >> "$GITHUB_ENV"

          # build-mac.sh reads this and passes `cc_wrapper="sccache"`
          # into gn gen when it's set. (See build-mac.sh near GN_ARGS.)
          echo "CLAUM_USE_SCCACHE=1"                         >> "$GITHUB_ENV"

          # Sanity: log version + initial stats. If the cache was
          # restored, --show-stats should say e.g. "Cache size: 1.2 GB"
          # and "Cache hits: 0" (hits will climb during the build).
          sccache --version
          sccache --show-stats || true
          echo ""
          echo "Disk cache path: $HOME/.sccache-disk"
          du -sh "$HOME/.sccache-disk" 2>/dev/null || echo "(empty)"

      # ------------------------------------------------------------------
      # Diagnostic: inspect the SDK's modulemap layout.
      #
      # Chromium's libc++ build compiles Clang modules from .modulemap
      # files that live somewhere under the SDK's usr/include/. Depending
      # on the Xcode version, these files can be either directly in
      # usr/include/ OR in a subdirectory like _AvailabilityInternal/.
      #
      # If our build fails with a "missing and no known rule to make it"
      # error for a .modulemap file, this diagnostic tells us exactly
      # where those files actually live on this runner — so we can decide
      # whether to patch Chromium, disable modules, or switch Xcode.
      # ------------------------------------------------------------------
      - name: Diagnostic - SDK modulemap layout
        run: |
          SDK_INC="$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk/usr/include"
          echo "==> SDK include path: $SDK_INC"
          echo ""
          echo "==> All .modulemap files under the SDK include dir (first 40):"
          find "$SDK_INC" -name '*.modulemap' 2>/dev/null | head -40 || true
          echo ""
          echo "==> Files with 'Darwin' in their name (first 20):"
          find "$SDK_INC" -iname '*Darwin*' 2>/dev/null | head -20 || true
          echo ""
          echo "==> Is _AvailabilityInternal a directory?"
          ls -la "$SDK_INC/_AvailabilityInternal" 2>/dev/null || echo "(not a directory / does not exist)"
          echo ""
          echo "==> Does DarwinFoundation1.modulemap exist anywhere in the SDK?"
          find "$DEVELOPER_DIR" -name 'DarwinFoundation*.modulemap' 2>/dev/null | head -10 || echo "(none found)"

      - name: Cache Chromium source
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/claum-build/build/downloads
          key: chromium-src-${{ hashFiles('CHROMIUM_VERSION') }}
          restore-keys: |
            chromium-src-

      - name: Run Claum build
        env:
          CLAUM_BUILD_ROOT: ${{ github.workspace }}/claum-build
        run: |
          chmod +x claum/scripts/build-mac.sh
          # `inputs.arch` / `inputs.default_search` are only set on
          # workflow_dispatch triggers. On push triggers they're empty —
          # the `||` fallback picks our defaults (arm64 / bing).
          ./claum/scripts/build-mac.sh \
            --arch           "${{ inputs.arch || 'arm64' }}" \
            --default-search "${{ inputs.default_search || 'bing' }}"

      # `if: always()` runs this step even if the Run Claum build step
      # failed or the job was cancelled by timeout. That lets us see the
      # cache hit rate even on partial runs (to confirm sccache is working).
      - name: Show sccache stats and prepare cache for save
        if: always()
        run: |
          # Don't `set -e` — every command here is best-effort cleanup.
          set -uo pipefail

          echo "=== sccache final stats ==="
          sccache --show-stats || true

          # ----------------------------------------------------------
          # Flush + stop the server before the actions/cache save step
          # tries to tar up ~/.sccache-disk. Build #42's save failed
          # with `gtar exit 1`, almost certainly because gtar tried to
          # archive files that the still-running sccache server was
          # writing to. Belt-and-suspenders shutdown:
          # ----------------------------------------------------------
          echo ""
          echo "=== Stopping sccache server ==="
          sccache --stop-server || true

          # Give it a moment to actually exit, then SIGKILL anything
          # that's left.
          for i in 1 2 3 4 5; do
            if pgrep -x sccache >/dev/null 2>&1; then
              echo "  sccache still running — sending SIGKILL (try $i)"
              pkill -9 -x sccache 2>/dev/null || true
              sleep 1
            else
              echo "  sccache server fully stopped"
              break
            fi
          done

          # ----------------------------------------------------------
          # Remove anything tar can't archive: Unix domain sockets,
          # FIFOs, and broken symlinks. sccache shouldn't normally
          # leave these in $SCCACHE_DIR but we've seen `gtar exit 1`
          # under cancellation, so be defensive.
          # ----------------------------------------------------------
          echo ""
          echo "=== Cleaning unsavable file types from cache ==="
          find "$HOME/.sccache-disk" -type s -delete 2>/dev/null || true
          find "$HOME/.sccache-disk" -type p -delete 2>/dev/null || true
          # Broken symlinks → -xtype l (link whose target doesn't exist)
          find "$HOME/.sccache-disk" -xtype l -delete 2>/dev/null || true

          # ----------------------------------------------------------
          # Make sure the runner user owns everything (safe even though
          # the runner shouldn't be running anything as root here).
          # ----------------------------------------------------------
          sudo chown -R "$(whoami)" "$HOME/.sccache-disk" 2>/dev/null || true

          echo ""
          echo "=== sccache disk cache size ==="
          du -sh "$HOME/.sccache-disk" 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== file count ==="
          find "$HOME/.sccache-disk" -type f 2>/dev/null | wc -l || true

      # ------------------------------------------------------------------
      # Persist the sccache disk cache back to actions/cache.
      # ------------------------------------------------------------------
      # `if: always()` is CRITICAL here. This step runs on every exit
      # path — success, compile error, AND the 5h30m timeout. If the
      # build timed out, ~10,000 compiled objects may be in the disk
      # cache; without this save step they'd be thrown away when the
      # runner VM is destroyed, and the retry would start over from
      # scratch. THAT is what made build #38 futile.
      #
      # The key is unique per run_id + attempt so no two saves ever
      # collide (actions/cache rejects duplicate keys). The RESTORE step
      # above uses prefix matching, so it'll pick up THIS save on the
      # next run regardless of the exact key.
      # ------------------------------------------------------------------
      - name: Save sccache disk cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.sccache-disk
          key: sccache-mac-arm64-v3-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package .app as .dmg
        # Same inputs-fallback pattern as the build step above.
        # `continue-on-error: true` means if this step fails (because the
        # build above was killed mid-link and Claum.app isn't complete),
        # the workflow doesn't mark as hard failure — the build-failure-handler
        # will still classify it but we preserve the cache for a retry.
        env:
          ARCH: ${{ inputs.arch || 'arm64' }}
        run: |
          cd $CLAUM_BUILD_ROOT/build/src/out/Claum
          hdiutil create -volname "Claum" \
                         -srcfolder "Claum.app" \
                         -ov -format UDZO \
                         "Claum-${ARCH}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        # `if: success()` ensures we only upload if the .dmg actually exists.
        # If the build timed out, there's no .dmg to upload — we just rely on
        # sccache to warm the cache for the next auto-retry.
        if: success()
        with:
          name: Claum-macOS-${{ inputs.arch || 'arm64' }}
          path: ${{ env.CLAUM_BUILD_ROOT }}/build/src/out/Claum/Claum-${{ inputs.arch || 'arm64' }}.dmg
          retention-days: 14
