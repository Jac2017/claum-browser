# ============================================================================
# Claum — macOS build on GitHub Actions
# ----------------------------------------------------------------------------
# Triggered manually (Actions tab → "Build Claum (macOS)" → Run workflow).
# Produces an arm64 (Apple Silicon) .dmg as a downloadable artifact.
#
# Timing: ~3–5 hours on GitHub's macOS runners. The free tier has a 6 hour
# cap, so we use the largest macos-* runner available (macos-14 is M1).
# ============================================================================

name: Build Claum (macOS)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        default: "arm64"
        type: choice
        options: [arm64, x86_64]
      default_search:
        description: "Default search engine"
        default: "bing"
        type: choice
        options: [bing, duckduckgo, google, startpage]

jobs:
  build:
    # macos-15 = Apple Silicon M1 with Xcode 16.3+ (has newer MacOSX SDK with
    # the DarwinFoundation1.modulemap file that Chromium 146 references).
    # Was macos-14, which ships Xcode 16.2 and triggers the modulemap bug.
    runs-on: macos-15
    timeout-minutes: 330   # 5 hr 30 min — just under GitHub's 6 hr cap
    steps:
      - name: Check out Claum repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Chromium 146 requires macOS SDK 15+. We don't care about Xcode VERSION
      # numbers — we only care that the Xcode we pick has SDK 15 inside it.
      # (Apple's version naming is messy: Xcode 16 ships SDK 15, Xcode 26
      # ships SDK 26, etc., and GitHub's runner image changes over time.)
      #
      # Strategy: enumerate every /Applications/Xcode*.app, peek inside its
      # SDKs/ folder, pick whichever Xcode actually contains a MacOSX SDK
      # with version >= 15. Then persist the choice to $GITHUB_ENV so it's
      # in scope for ALL later steps (otherwise xcode-select -s alone is
      # fragile — env vars take precedence over the global symlink).
      # ------------------------------------------------------------------
      - name: Select Xcode with macOS SDK 15+
        run: |
          echo "==> Xcodes installed on this runner:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          echo ""
          echo "==> Checking which Xcode has SDK 15+ ..."
          BEST_XCODE=""
          BEST_SDK_VER=""

          for app in /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            SDK_DIR="$app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"
            [ -d "$SDK_DIR" ] || continue

            # Look for any MacOSX<NN>.sdk where NN >= 15.
            # `ls` returns names like MacOSX15.sdk, MacOSX15.4.sdk, MacOSX26.sdk, etc.
            for sdk in "$SDK_DIR"/MacOSX*.sdk; do
              [ -d "$sdk" ] || continue
              base=$(basename "$sdk")
              # Strip the prefix and suffix to extract a version number.
              # e.g. "MacOSX15.4.sdk" -> "15.4"
              ver=$(echo "$base" | sed -E 's/MacOSX([0-9.]+)\.sdk/\1/')
              [ -z "$ver" ] && continue
              # MacOSX.sdk (no version) is a symlink to whatever's default; skip.
              [ "$base" = "MacOSX.sdk" ] && continue

              # Major-version check: split on the first dot.
              major="${ver%%.*}"
              if [ "$major" -ge 15 ] 2>/dev/null; then
                echo "  $app contains $base (version $ver)"
                # Keep track of the highest SDK version seen.
                # `sort -V` understands semantic versions (15.0 < 15.4 < 26.0).
                if [ -z "$BEST_SDK_VER" ] \
                   || [ "$(printf '%s\n%s\n' "$BEST_SDK_VER" "$ver" | sort -V | tail -1)" = "$ver" ]; then
                  BEST_SDK_VER="$ver"
                  BEST_XCODE="$app"
                fi
              fi
            done
          done

          if [ -z "$BEST_XCODE" ]; then
            echo ""
            echo "ERROR: No Xcode with macOS SDK 15+ found on this runner."
            echo "Chromium 146 requires SDK 15+. Either:"
            echo "  - upgrade the runner to macos-15 in build-mac.yml, OR"
            echo "  - add a step that downloads SDK 15 from xcodes.dev."
            echo ""
            echo "SDKs found per Xcode:"
            for app in /Applications/Xcode*.app; do
              echo "  $app:"
              ls "$app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs" 2>/dev/null || echo "    (no SDK dir)"
            done
            exit 1
          fi

          echo ""
          echo "==> Selected: $BEST_XCODE  (best SDK: $BEST_SDK_VER)"
          sudo xcode-select -s "$BEST_XCODE/Contents/Developer"

          # Persist the choice for ALL subsequent steps. DEVELOPER_DIR takes
          # precedence over xcode-select's global symlink — so even if the
          # symlink later gets disturbed (e.g. by deleting the directory it
          # points to), tools like xcrun/xcodebuild will still find the right
          # Xcode via this env var.
          echo "DEVELOPER_DIR=$BEST_XCODE/Contents/Developer" >> "$GITHUB_ENV"
          echo "SDKROOT=$BEST_XCODE/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" >> "$GITHUB_ENV"

          echo ""
          echo "==> Verification:"
          xcode-select -p
          xcodebuild -version
          echo "SDKs in selected Xcode:"
          ls "$BEST_XCODE/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"

      # ------------------------------------------------------------------
      # GitHub's macOS runners come preloaded with multiple Xcode versions,
      # tons of iOS simulators, the Android SDK, etc. We only need ONE
      # Xcode and the Apple Silicon simulators are irrelevant to us.
      # Clearing this out frees ~30-50 GB, which Chromium's build needs.
      #
      # NOTE: this runs AFTER the "Select Xcode 16+" step above, so the
      # "active" Xcode we preserve here is the Xcode 16 we just selected —
      # not the runner's original default (which is typically Xcode 15.x).
      # ------------------------------------------------------------------
      - name: Free up disk space on runner
        run: |
          echo "Disk space BEFORE cleanup:"
          df -h /
          df -h $HOME

          # Determine the active Xcode and its CANONICAL path (resolves any
          # symlinks). DEVELOPER_DIR was set by the previous step, but fall
          # back to xcode-select if it's not set for some reason.
          ACTIVE_RAW="${DEVELOPER_DIR:-$(xcode-select -p)}"
          ACTIVE_XCODE="${ACTIVE_RAW%/Contents/Developer}"
          # `realpath` resolves symlinks and trailing slashes — so paths like
          # /Applications/Xcode.app and /Applications/Xcode_16.2.app resolve
          # to the same canonical path if one is a symlink to the other.
          ACTIVE_CANON=$(realpath "$ACTIVE_XCODE" 2>/dev/null || echo "$ACTIVE_XCODE")
          echo "Active Xcode (raw):      $ACTIVE_XCODE"
          echo "Active Xcode (canonical): $ACTIVE_CANON"

          # Walk every /Applications/Xcode*.app and delete only those whose
          # canonical path differs from the active one.
          for app in /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            APP_CANON=$(realpath "$app" 2>/dev/null || echo "$app")
            if [ "$APP_CANON" = "$ACTIVE_CANON" ]; then
              echo "Keeping  $app"
            else
              echo "Removing $app"
              sudo rm -rf "$app"
            fi
          done

          # Remove iOS / tvOS / watchOS simulator runtimes we don't need
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Devices || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true

          # Android SDK / NDK / emulator (~14 GB) — we're building macOS, no Android.
          sudo rm -rf $ANDROID_HOME || true
          sudo rm -rf $ANDROID_NDK_HOME || true
          sudo rm -rf /Users/runner/Library/Android || true
          sudo rm -rf /usr/local/lib/android || true

          # Misc preinstalled clutter
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf ~/.dotnet || true

          echo ""
          echo "Disk space AFTER cleanup:"
          df -h /
          df -h $HOME

      - name: Install build dependencies
        run: |
          brew update
          # ninja = the actual build runner gn generates files for.
          # gn itself isn't in Homebrew — we build it from source in the
          # build script (see build-mac.sh step 1c).
          brew install ninja python3 rsync

      # ------------------------------------------------------------------
      # Diagnostic: inspect the SDK's modulemap layout.
      #
      # Chromium's libc++ build compiles Clang modules from .modulemap
      # files that live somewhere under the SDK's usr/include/. Depending
      # on the Xcode version, these files can be either directly in
      # usr/include/ OR in a subdirectory like _AvailabilityInternal/.
      #
      # If our build fails with a "missing and no known rule to make it"
      # error for a .modulemap file, this diagnostic tells us exactly
      # where those files actually live on this runner — so we can decide
      # whether to patch Chromium, disable modules, or switch Xcode.
      # ------------------------------------------------------------------
      - name: Diagnostic - SDK modulemap layout
        run: |
          SDK_INC="$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk/usr/include"
          echo "==> SDK include path: $SDK_INC"
          echo ""
          echo "==> All .modulemap files under the SDK include dir (first 40):"
          find "$SDK_INC" -name '*.modulemap' 2>/dev/null | head -40 || true
          echo ""
          echo "==> Files with 'Darwin' in their name (first 20):"
          find "$SDK_INC" -iname '*Darwin*' 2>/dev/null | head -20 || true
          echo ""
          echo "==> Is _AvailabilityInternal a directory?"
          ls -la "$SDK_INC/_AvailabilityInternal" 2>/dev/null || echo "(not a directory / does not exist)"
          echo ""
          echo "==> Does DarwinFoundation1.modulemap exist anywhere in the SDK?"
          find "$DEVELOPER_DIR" -name 'DarwinFoundation*.modulemap' 2>/dev/null | head -10 || echo "(none found)"

      - name: Cache Chromium source
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/claum-build/build/downloads
          key: chromium-src-${{ hashFiles('CHROMIUM_VERSION') }}
          restore-keys: |
            chromium-src-

      - name: Run Claum build
        env:
          CLAUM_BUILD_ROOT: ${{ github.workspace }}/claum-build
        run: |
          chmod +x claum/scripts/build-mac.sh
          ./claum/scripts/build-mac.sh \
            --arch           "${{ inputs.arch }}" \
            --default-search "${{ inputs.default_search }}"

      - name: Package .app as .dmg
        run: |
          cd $CLAUM_BUILD_ROOT/build/src/out/Claum
          hdiutil create -volname "Claum" \
                         -srcfolder "Claum.app" \
                         -ov -format UDZO \
                         "Claum-${{ inputs.arch }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claum-macOS-${{ inputs.arch }}
          path: ${{ env.CLAUM_BUILD_ROOT }}/build/src/out/Claum/Claum-${{ inputs.arch }}.dmg
          retention-days: 14
