# ============================================================================
# Claum — Autopilot (watchdog of watchdogs)
# ----------------------------------------------------------------------------
# PURPOSE
#   Keep the Chromium build moving forward with ZERO human intervention,
#   even if one of the other workflows breaks.
#
#   We already have two workflows:
#     - build-mac.yml             — does the actual compile
#     - build-failure-handler.yml — auto-retries transient failures
#
#   Problem: if build-failure-handler itself errors out (a bug in its own
#   YAML or a REST API quirk), nothing retries the build. That's what bit
#   us on build #38 — the handler died in 6s with a filter bug and the
#   build just sat there. This file is the safety net underneath.
#
# WHAT IT DOES
#   Every 30 minutes (plus reactively whenever ANY Claum workflow finishes),
#   this workflow inspects the state of build-mac and, if it sees the build
#   is stuck / failed / cancelled AND no one else has rescued it, fires off
#   a fresh workflow_dispatch. With the new sccache-disk cache, each retry
#   picks up where the last one left off, so the build is GUARANTEED to
#   converge in a handful of retries.
#
# WHAT IT WILL *NOT* DO
#   - Commit or push code. It only dispatches builds — never authors changes.
#     (Code fixes come from a human / Claude session, not from the autopilot.)
#   - Retry if the most recent run is still running. It's patient.
#   - Spin forever. A safety cap of 15 attempts on the same commit triggers
#     an escalation issue instead of another retry.
#
# FREQUENCY & COST
#   - Runs on `ubuntu-latest` (free tier). Each wake-up is ~10-30 seconds.
#   - Scheduled every 30 min → 48 wake-ups/day → ~10 minutes/day total.
#   - Reactive wake-ups only fire when other workflows finish, so at most
#     once per build cycle (~6 hours).
#   - Well within the 2000-min/month GitHub free-tier budget.
# ============================================================================

name: Claum autopilot

on:
  # ------------------------------------------------------------------------
  # Scheduled wake-up: every 30 min.
  # ------------------------------------------------------------------------
  # GitHub aligns cron schedules to the top and bottom of the hour
  # (best-effort — delays of a few min are common on free tier). That's
  # fine for us: we're not time-critical, we're just a backstop.
  # ------------------------------------------------------------------------
  schedule:
    - cron: '*/30 * * * *'

  # ------------------------------------------------------------------------
  # Reactive wake-up: fires immediately after EITHER of the other Claum
  # workflows completes. That's how we notice a handler failure within
  # seconds instead of waiting up to 30 min for the next cron tick.
  # ------------------------------------------------------------------------
  workflow_run:
    workflows:
      - "Build Claum (macOS)"
      - "Build failure handler"
    types: [completed]

  # ------------------------------------------------------------------------
  # Manual trigger: useful for kicking the tires without waiting.
  # ------------------------------------------------------------------------
  workflow_dispatch:

# ----------------------------------------------------------------------------
# Permissions we need:
#   - actions: write  — to dispatch new build-mac runs
#   - issues:  write  — to file escalation issues when the safety cap hits
#   - contents: read  — to read repo metadata
# All other scopes stay at default (none).
# ----------------------------------------------------------------------------
permissions:
  actions: write
  issues: write
  contents: read

# ----------------------------------------------------------------------------
# Only one autopilot instance runs at a time. If cron and workflow_run fire
# within seconds of each other, the second one queues (not cancels). That's
# safer than cancelling — we never want to ABORT mid-decision.
# ----------------------------------------------------------------------------
concurrency:
  group: claum-autopilot
  cancel-in-progress: false

jobs:
  autopilot:
    runs-on: ubuntu-latest
    # Generous cap; a single REST round-trip through Octokit is <5s in
    # practice, but a Node install on a cold runner can take a minute.
    timeout-minutes: 10

    steps:
      - name: Inspect state and decide whether to intervene
        uses: actions/github-script@v7
        env:
          # --- thresholds, tweakable ---
          # How old (in minutes) the latest build-mac run must be before we
          # consider intervening. This gives the handler workflow time to
          # do its own retry first. Too low → we double-dispatch; too high
          # → we're slow to recover.
          STALE_MINUTES: "12"
          # Max attempts on a single commit before we file an escalation
          # issue instead of dispatching again.
          MAX_ATTEMPTS_PER_SHA: "15"
        with:
          script: |
            // ----------------------------------------------------------
            // Helpers
            // ----------------------------------------------------------
            const stale = parseInt(process.env.STALE_MINUTES, 10);
            const capPerSha = parseInt(process.env.MAX_ATTEMPTS_PER_SHA, 10);

            // Pretty-print run for log output.
            const fmt = (r) => {
              const ageMin = (
                (Date.now() - new Date(r.updated_at).getTime()) / 60000
              ).toFixed(1);
              return (
                `#${r.run_number} id=${r.id} status=${r.status} ` +
                `conclusion=${r.conclusion || 'null'} ` +
                `attempt=${r.run_attempt} age=${ageMin}min ` +
                `sha=${r.head_sha.slice(0,7)}`
              );
            };

            // Dispatch a fresh run of build-mac on main, with defaults.
            const dispatchBuild = async (reason) => {
              core.notice(`Dispatching build-mac: ${reason}`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: 'build-mac.yml',
                ref: 'main',
                inputs: { arch: 'arm64', default_search: 'bing' },
              });
            };

            // ----------------------------------------------------------
            // 1. Pull recent build-mac runs.
            // ----------------------------------------------------------
            const { data: mac } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'build-mac.yml',
              per_page: 30,
            });
            const macRuns = mac.workflow_runs || [];

            if (macRuns.length === 0) {
              core.warning('No build-mac runs exist at all — dispatching first one.');
              await dispatchBuild('cold start — no prior runs');
              return;
            }

            const latest = macRuns[0];
            core.info(`Latest build-mac: ${fmt(latest)}`);

            // ----------------------------------------------------------
            // 2. If latest is queued or in_progress → back off.
            // ----------------------------------------------------------
            // Even if it's been running for hours, that's fine — the
            // build legitimately takes ~3-5h and we shouldn't pre-empt
            // it. If it eventually hits the 5h30m wall the handler will
            // fire and, if the handler fails too, we'll catch that
            // downstream via the workflow_run trigger.
            if (latest.status !== 'completed') {
              core.info('Latest run is still active — nothing to do.');
              return;
            }

            // ----------------------------------------------------------
            // 3. If latest succeeded → nothing to do.
            // ----------------------------------------------------------
            if (latest.conclusion === 'success') {
              core.info('Latest run succeeded. Autopilot idle.');
              return;
            }

            // ----------------------------------------------------------
            // 4. Is a NEWER build-mac run already going?
            // ----------------------------------------------------------
            // The handler, a human, or a previous autopilot cycle may
            // have already kicked off a replacement. Never double-dispatch.
            const newer = macRuns.find(r =>
              r.id !== latest.id &&
              new Date(r.created_at) > new Date(latest.created_at)
            );
            if (newer) {
              core.info(
                `Newer run already exists: ${fmt(newer)}. ` +
                `Autopilot idle — someone else is handling it.`
              );
              return;
            }

            // ----------------------------------------------------------
            // 5. Give the build-failure-handler time to do its thing.
            // ----------------------------------------------------------
            // When build-mac finishes with failure/cancelled/timed_out,
            // the handler workflow fires within ~30 seconds. We wait at
            // least STALE_MINUTES before we step in, so we don't race
            // with the handler's own rerun attempt.
            const ageMin = (Date.now() - new Date(latest.updated_at).getTime()) / 60000;
            if (ageMin < stale) {
              core.info(
                `Latest failure is only ${ageMin.toFixed(1)}min old ` +
                `(< ${stale}min cutoff). Giving the handler time to retry.`
              );
              return;
            }

            // ----------------------------------------------------------
            // 6. Look at the build-failure-handler — did it fire and
            //    succeed? If so, a new run should be appearing any second.
            // ----------------------------------------------------------
            const { data: hd } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'build-failure-handler.yml',
              per_page: 10,
            });
            const hdlrRuns = hd.workflow_runs || [];
            // Handler runs are chronological; pick the most recent whose
            // triggering workflow_run matches our failed build-mac run.
            // (GH exposes this via `referenced_workflows` or the event
            //  payload; cheapest proxy is head_sha + recency.)
            const matchingHandler = hdlrRuns.find(h =>
              h.head_sha === latest.head_sha &&
              new Date(h.created_at) >= new Date(latest.updated_at)
            );

            if (matchingHandler) {
              core.info(`Matching handler run: ${fmt(matchingHandler)}`);
              if (matchingHandler.status !== 'completed') {
                core.info('Handler still running — giving it time.');
                return;
              }
              if (matchingHandler.conclusion === 'success') {
                // Handler succeeded but no new run yet? That means it
                // decided NOT to retry (e.g. is_transient=false → opened
                // an issue instead). Don't override that decision.
                core.info(
                  'Handler completed successfully but did not dispatch ' +
                  'a new run. Respecting that decision.'
                );
                return;
              }
              core.warning(
                `Handler run ${matchingHandler.id} ended with ` +
                `conclusion=${matchingHandler.conclusion}. ` +
                `Autopilot stepping in.`
              );
            } else {
              core.warning(
                'No matching handler run found after this build-mac ' +
                'failure. The handler may not have triggered — autopilot ' +
                'stepping in.'
              );
            }

            // ----------------------------------------------------------
            // 7. Safety cap: how many runs have we already tried on
            //    this exact commit?
            // ----------------------------------------------------------
            const sameSha = macRuns.filter(r => r.head_sha === latest.head_sha);
            const attemptCount = sameSha.reduce(
              (sum, r) => sum + (r.run_attempt || 1), 0
            );
            core.info(
              `Attempts on commit ${latest.head_sha.slice(0,7)}: ` +
              `${attemptCount} (${sameSha.length} runs × avg attempts)`
            );
            if (attemptCount >= capPerSha) {
              core.warning(
                `Hit safety cap (${attemptCount} ≥ ${capPerSha}) on ` +
                `commit ${latest.head_sha}. Escalating instead of retrying.`
              );
              // File an escalation issue tagged 'autopilot-escalation'.
              // Human / Claude needs to investigate and push a code fix.
              const title = `[autopilot] Build wedged on ${latest.head_sha.slice(0,7)} after ${attemptCount} attempts`;
              const body = [
                `The autopilot has retried commit \`${latest.head_sha}\` ` +
                `**${attemptCount}** times without success. Stopping ` +
                `automatic retries and escalating.`,
                '',
                `**Latest run:** ${latest.html_url}`,
                `**Latest conclusion:** ${latest.conclusion}`,
                `**Same-commit runs:**`,
                ...sameSha.slice(0, 10).map(r =>
                  `  - ${fmt(r)} — ${r.html_url}`
                ),
                '',
                'Autopilot will not retry this SHA again. Push a fix to main',
                'to reset the counter (new SHA → new budget).',
              ].join('\n');
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title,
                  body,
                  labels: ['autopilot-escalation', 'build-failure'],
                });
              } catch (err) {
                if (err.status === 422) {
                  // Label doesn't exist yet — create and retry without.
                  core.warning(`Issue create failed (${err.message}); ` +
                    `retrying without labels.`);
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    title,
                    body,
                  });
                } else {
                  throw err;
                }
              }
              return;
            }

            // ----------------------------------------------------------
            // 8. All clear — dispatch a fresh run.
            // ----------------------------------------------------------
            await dispatchBuild(
              `latest run ${fmt(latest)} needs a retry; handler did not ` +
              `rescue it; attempts-on-sha=${attemptCount}/${capPerSha}`
            );

            // ----------------------------------------------------------
            // 9. Summary block for the autopilot's own run page.
            // ----------------------------------------------------------
            await core.summary
              .addHeading('Autopilot: intervention dispatched')
              .addRaw(`Failed run: ${fmt(latest)}`).addBreak()
              .addRaw(`Attempts on commit: ${attemptCount}/${capPerSha}`)
              .addBreak()
              .addLink('Failed run', latest.html_url).addBreak()
              .write();
